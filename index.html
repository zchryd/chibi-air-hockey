  ctx.beginPath();ctx.arc( r*.21,-bH+r*.05,r*.07,0,Math.PI*2);ctx.fill();

  // --- Head ---
  ctx.fillStyle='#0d0000';
  ctx.beginPath();ctx.arc(0,-bH-r*.10,r*.30,0,Math.PI*2);ctx.fill();
  // Eye highlights
  ctx.fillStyle='rgba(255,255,255,0.72)';
  ctx.beginPath();ctx.arc(-r*.12,-bH-r*.14,r*.07,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc( r*.12,-bH-r*.14,r*.07,0,Math.PI*2);ctx.fill();

  // --- Antennae ---
  ctx.strokeStyle='#0d0000';ctx.lineWidth=1.1;
  ctx.beginPath();ctx.moveTo(-r*.10,-bH-r*.33);
  ctx.quadraticCurveTo(-r*.44,-bH-r*.72,-r*.31,-bH-r*1.02);ctx.stroke();
  ctx.beginPath();ctx.moveTo( r*.10,-bH-r*.33);
  ctx.quadraticCurveTo( r*.44,-bH-r*.72, r*.31,-bH-r*1.02);ctx.stroke();
  ctx.fillStyle='#0d0000';
  ctx.beginPath();ctx.arc(-r*.31,-bH-r*1.02,r*.09,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc( r*.31,-bH-r*1.02,r*.09,0,Math.PI*2);ctx.fill();

  // --- Legs (3 per side) ---
  ctx.strokeStyle='#250000';ctx.lineWidth=1;
  for(let i=0;i<3;i++){
    const ly=-bH*.10+i*bH*.42, llen=r*.42;
    ctx.beginPath();ctx.moveTo(-bW,ly);ctx.lineTo(-bW-llen,ly+r*.20);ctx.stroke();
    ctx.beginPath();ctx.moveTo( bW,ly);ctx.lineTo( bW+llen,ly+r*.20);ctx.stroke();
  }
  ctx.restore();
}

const PORTAL_COLS=['#ff44cc','#44ccff','#aaff44'];
const PORTAL_GLOW=['rgba(255,40,200,0.9)','rgba(40,200,255,0.9)','rgba(160,255,40,0.9)'];
function drawPortalTriangle(cx,cy,R,angle,o){
  const t=frameN*0.8;
  const pf=o.portalFlash;
  // Decay flash timers
  for(let i=0;i<3;i++){if(pf[i]>0)pf[i]--;}

  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(angle);

  // Vertices
  const V=[];
  for(let i=0;i<3;i++){const a=-Math.PI/2+i*Math.PI*2/3;V.push([R*Math.cos(a),R*Math.sin(a)]);}

  // Dark void interior
  ctx.beginPath();
  V.forEach(([vx,vy],i)=>i===0?ctx.moveTo(vx,vy):ctx.lineTo(vx,vy));
  ctx.closePath();
  const grad=ctx.createRadialGradient(0,0,0,0,0,R);
  grad.addColorStop(0,'rgba(0,180,140,0.28)');
  grad.addColorStop(0.5,'rgba(0,60,50,0.55)');
  grad.addColorStop(1,'rgba(0,10,8,0.80)');
  ctx.fillStyle=grad;ctx.fill();

  // Portal edges
  for(let i=0;i<3;i++){
    const[ax,ay]=V[i],[bx,by]=V[(i+1)%3];
    const flash=pf[i]/20;  // 1→0
    const pulse=0.5+0.5*Math.sin(t*0.85+i*Math.PI*2/3);
    ctx.save();
    ctx.shadowColor=flash>0?PORTAL_GLOW[i]:PORTAL_COLS[i];
    ctx.shadowBlur=flash>0?35+flash*30:8+pulse*14;
    ctx.strokeStyle=flash>0?`rgba(255,255,255,${0.55+flash*0.45})`:PORTAL_COLS[i];
    ctx.lineWidth=flash>0?5+flash*5:2.5+pulse*1.5;
    ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();
    ctx.restore();

    // Travelling orb along the edge
    const orbT=(frameN*0.022+i*0.62)%1;
    const orbX=ax+(bx-ax)*orbT, orbY=ay+(by-ay)*orbT;
    ctx.save();
    ctx.shadowColor=PORTAL_COLS[i];ctx.shadowBlur=10;
    ctx.fillStyle=PORTAL_COLS[i];
    ctx.globalAlpha=0.55+0.35*Math.sin(t*0.9+i);
    ctx.beginPath();ctx.arc(orbX,orbY,3,0,Math.PI*2);ctx.fill();
    ctx.restore();

    // Flash ring at edge midpoint when portal fires
    if(flash>0){
      const mx=(ax+bx)*0.5, my=(ay+by)*0.5;
      ctx.save();
      ctx.shadowColor=PORTAL_GLOW[i];ctx.shadowBlur=18;
      ctx.strokeStyle=`rgba(255,255,255,${flash*0.65})`;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(mx,my,(1-flash)*R*0.55,0,Math.PI*2);ctx.stroke();
      ctx.restore();
    }
  }

  // Center void swirl
  ctx.save();
  for(let i=0;i<3;i++){
    const a=frameN*0.018+i*Math.PI*2/3;
    ctx.strokeStyle=`hsla(${(t*1.2+i*120)%360},90%,55%,0.22)`;
    ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,0,R*0.20,a,a+Math.PI*.55);ctx.stroke();
  }
  ctx.restore();

  ctx.restore();
}
function drawShark(x,y,r,angle){
  ctx.save();ctx.translate(x,y);ctx.rotate(angle);
  // Bite animation: jaw opens then snaps shut over 24 frames
  const biteF=sharkBiteTimer>0?sharkBiteTimer/24:0;
  // Quick open (first 8 frames), slow close (remaining 16)
  const jawOpen=biteF>0.67?((1-biteF)/0.33):biteF/0.67;
  const jawAng=jawOpen*0.45; // max jaw opening angle in radians
  // Body shadow/glow
  ctx.shadowColor='rgba(40,60,90,0.6)';ctx.shadowBlur=16;
  // Main body — elongated oval
  ctx.fillStyle='#667788';
  ctx.beginPath();ctx.ellipse(0,0,r*1.6,r*0.7,0,0,Math.PI*2);ctx.fill();
  // Belly (lighter underside)
  ctx.fillStyle='#99aabb';
  ctx.beginPath();ctx.ellipse(0,r*0.15,r*1.3,r*0.35,0,0,Math.PI);ctx.fill();
  // Dorsal fin
  ctx.fillStyle='#556677';
  ctx.beginPath();ctx.moveTo(-r*0.3,-r*0.65);ctx.lineTo(r*0.3,-r*0.35);ctx.lineTo(-r*0.15,-r*0.35);ctx.fill();
  // Tail fin
  ctx.fillStyle='#556677';
  ctx.beginPath();ctx.moveTo(-r*1.4,0);ctx.lineTo(-r*1.9,-r*0.5);ctx.lineTo(-r*1.5,0);ctx.lineTo(-r*1.9,r*0.5);ctx.fill();
  // Gill slits
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(40,50,60,0.35)';ctx.lineWidth=1.5;
  for(let i=0;i<3;i++){const gx=r*0.3-i*r*0.15;ctx.beginPath();ctx.moveTo(gx,-r*0.25);ctx.lineTo(gx,r*0.1);ctx.stroke();}
  // Eye — angrier during bite
  const eyeR=r*0.12+(biteF>0?0.02*r:0);
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(r*0.7,-r*0.18,eyeR,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=biteF>0?'#ff1111':'#ff3333';ctx.beginPath();ctx.arc(r*0.72,-r*0.18,r*0.06,0,Math.PI*2);ctx.fill();
  // Upper jaw (rotates up during bite)
  ctx.save();ctx.translate(r*0.65,0);ctx.rotate(-jawAng);
  ctx.fillStyle='#778899';
  ctx.beginPath();ctx.moveTo(0,-r*0.35);ctx.quadraticCurveTo(r*0.6,-r*0.38,r*0.65,-r*0.05);
  ctx.lineTo(0,0);ctx.fill();
  // Upper teeth
  if(jawOpen>0.05){
    ctx.fillStyle='#ffffff';
    for(let i=0;i<5;i++){
      const tx=r*0.08+i*r*0.12, th=r*0.12+Math.sin(i*1.5)*r*0.04;
      ctx.beginPath();ctx.moveTo(tx,0);ctx.lineTo(tx+r*0.04,-th);ctx.lineTo(tx+r*0.08,0);ctx.fill();
    }
  }
  ctx.restore();
  // Lower jaw (rotates down during bite)
  ctx.save();ctx.translate(r*0.65,0);ctx.rotate(jawAng);
  ctx.fillStyle='#6b7b8b';
  ctx.beginPath();ctx.moveTo(0,r*0.35);ctx.quadraticCurveTo(r*0.6,r*0.38,r*0.65,r*0.05);
  ctx.lineTo(0,0);ctx.fill();
  // Lower teeth
  if(jawOpen>0.05){
    ctx.fillStyle='#ffffff';
    for(let i=0;i<5;i++){
      const tx=r*0.08+i*r*0.12, th=r*0.10+Math.sin(i*1.2)*r*0.03;
      ctx.beginPath();ctx.moveTo(tx,0);ctx.lineTo(tx+r*0.04,th);ctx.lineTo(tx+r*0.08,0);ctx.fill();
    }
  }
  // Mouth interior (red gums visible when open)
  if(jawOpen>0.1){
    ctx.fillStyle=`rgba(180,30,30,${jawOpen*0.8})`;
    ctx.beginPath();ctx.ellipse(r*0.2,0,r*0.25*jawOpen,r*0.12*jawOpen,0,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
  ctx.restore();
  // Decrement bite timer (done here so it ticks with draw)
  if(sharkBiteTimer>0)sharkBiteTimer--;
}
function drawOctopus(x,y,r,angle){
  ctx.save();ctx.translate(x,y);
  // Tentacles — 8 wavy arms
  for(let i=0;i<8;i++){
    const ta=Math.PI*2*i/8+frameN*0.008;
    const tlen=r*1.8;
    ctx.strokeStyle=`hsla(${280+i*5},60%,${45+i*3}%,0.7)`;ctx.lineWidth=3.5-i*0.15;
    ctx.beginPath();
    let tx=0,ty=0;
    ctx.moveTo(tx,ty);
    for(let j=1;j<=6;j++){
      const f=j/6;
      tx=Math.cos(ta)*tlen*f+Math.sin(frameN*0.03+i*1.1+j*0.7)*r*0.35*f;
      ty=Math.sin(ta)*tlen*f+Math.cos(frameN*0.025+i*0.9+j*0.5)*r*0.3*f;
      ctx.lineTo(tx,ty);
    }

  }
  // Head — round dome

  hg.addColorStop(0,'#bb66ee');hg.addColorStop(0.6,'#8833bb');hg.addColorStop(1,'#551188');
  ctx.fillStyle=hg;ctx.beginPath();ctx.arc(0,0,r*0.85,0,Math.PI*2);ctx.fill();

  // Eyes
  ctx.shadowBlur=0;
  for(const sx of[-1,1]){

    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(sx*r*0.32,-r*0.05,r*0.1,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sx*r*0.34,-r*0.1,r*0.04,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function drawObstacles(){
  const obs=STAGES[currentStage].obstacles;
  if(!obs.length)return;
  const pulse=0.5+0.5*Math.sin(frameN*.07);

  const isNeon=STAGES[currentStage].name==='Neon Arcade';
  for(let oi=0;oi<obs.length;oi++){
    const o=obs[oi];
    const{x:ox,y:oy}=obsPos(o,oi);

    if(o.type==='turntable'){
      drawTurntable(ox,oy,o.r,o);
    }else if(o.type==='chicken'){
      if(chickenPhase!=='waiting')drawChicken(ox,oy,o.r,o.wangle||0,chickenPhase,o.flapT||0);
    }else if(o.type==='ladybug'){
      drawLadybug(ox,oy,o.r,o.wangle||0);
    }else if(o.type==='shark'){
      drawShark(ox,oy,o.r,o.wangle||0);
    }else if(o.type==='octopus'){
      drawOctopus(ox,oy,o.r,o.wangle||0);
    }else if(o.type==='fish'){
      drawFish(ox,oy,o.r,o.wangle||0,o.col,o.ltCol);
    }else if(o.type==='hex'){
      drawHexObstacle(ox,oy,o.r,arcticAngle*(o.rotSpeed||0.2),o);
    }else if(o.type==='portal_tri'){
      drawPortalTriangle(ox,oy,o.size,arcticAngle*(o.rotSpeed||0.22),o);
    }else if(o.type==='triangle'){
      drawTriangleObstacle(ox,oy,triRadius(o),arcticAngle*(o.rotSpeed||0.3));
    }else if(o.type==='pyramid'){
      drawPyramidObstacle(ox,oy,o.size,arcticAngle*(o.rotSpeed||0.65),pulse);
    }else if(o.type==='pinball'){
      if(o.hitTimer>0)o.hitTimer--;
      const hf=o.hitTimer/18; // 1→0 over 18 frames
      const hit=hf>0;
      const bodyR=o.r*(1+hf*0.32);

      // Expanding hit ring
      if(hit){
        ctx.save();
        ctx.shadowColor='rgba(255,200,60,0.9)';ctx.shadowBlur=28;
        ctx.strokeStyle=`rgba(255,230,80,${hf*0.85})`;ctx.lineWidth=3.5;
        ctx.beginPath();ctx.arc(ox,oy,o.r+(.1-hf)*o.r*1.6+o.r*1.6,0,Math.PI*2);
        // ring starts at edge and expands outward
        const ringR=o.r*(1.1+(1-hf)*1.8);
        ctx.beginPath();ctx.arc(ox,oy,ringR,0,Math.PI*2);ctx.stroke();
        ctx.restore();
      }

      // Glow halo
      ctx.save();
      ctx.shadowColor=hit?'rgba(255,220,60,1.0)':o.glowCol;
      ctx.shadowBlur=hit?50+hf*30:18+pulse*14;
      ctx.strokeStyle=hit?`rgba(255,240,100,${0.5+hf*0.5})`:`rgba(255,80,0,${0.25+pulse*0.5})`;
      ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(ox,oy,bodyR+4,0,Math.PI*2);ctx.stroke();
      ctx.restore();

      // Body
      const bg=ctx.createRadialGradient(ox-bodyR*.3,oy-bodyR*.25,bodyR*.08,ox,oy,bodyR);
      bg.addColorStop(0,hit?`rgba(255,255,${Math.round(180*hf)},1)`:'#ff9955');
      bg.addColorStop(0.5,hit?`rgba(255,${Math.round(80+120*hf)},20,1)`:'#dd3300');
      bg.addColorStop(1,o.col);
      ctx.fillStyle=bg;ctx.beginPath();ctx.arc(ox,oy,bodyR,0,Math.PI*2);ctx.fill();

      // Concentric inner ring
      ctx.strokeStyle=hit?`rgba(255,240,100,${0.6+hf*0.4})`:`rgba(255,150,60,${0.28+pulse*0.28})`;
      ctx.lineWidth=1.6;
      ctx.beginPath();ctx.arc(ox,oy,bodyR*.62,0,Math.PI*2);ctx.stroke();

      // Outer rim
      ctx.strokeStyle=hit?`rgba(255,255,180,${0.7+hf*0.3})`:'rgba(255,255,255,0.28)';
      ctx.lineWidth=2;ctx.beginPath();ctx.arc(ox,oy,bodyR,0,Math.PI*2);ctx.stroke();

      // Spike tick-marks around the edge — spin faster when hit
      ctx.save();ctx.translate(ox,oy);
      const spikeSpd=hit?frameN*0.09:frameN*0.018;
      ctx.rotate(spikeSpd);
      for(let s=0;s<8;s++){
        const a=s/8*Math.PI*2;
        const r1=bodyR*.76, r2=bodyR*(hit?1.06:0.97);
        ctx.strokeStyle=hit?`rgba(255,250,120,${0.7+hf*0.3})`:`rgba(255,130,60,${0.3+pulse*0.35})`;
        ctx.lineWidth=hit?2.2:1.5;
        ctx.beginPath();ctx.moveTo(Math.cos(a)*r1,Math.sin(a)*r1);ctx.lineTo(Math.cos(a)*r2,Math.sin(a)*r2);ctx.stroke();
      }
      ctx.restore();

      // Highlight
      ctx.fillStyle=hit?`rgba(255,255,220,${0.55+hf*0.35})`:'rgba(255,255,255,0.40)';
      ctx.beginPath();ctx.arc(ox-o.r*.3,oy-o.r*.28,o.r*.23*(1+hf*.3),0,Math.PI*2);ctx.fill();

    }else if(isNeon){
      // Pulsing glow — two layered halos
      const gp=0.5+0.5*Math.sin(frameN*.045+oi*Math.PI); // slower, offset per bumper
      const glowBlur=22+gp*28;
      ctx.save();
      ctx.shadowColor=o.glowCol;ctx.shadowBlur=glowBlur;
      // Outer halo ring
      ctx.strokeStyle=`rgba(255,80,255,${0.25+gp*0.5})`;ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(ox,oy,o.r+4+gp*4,0,Math.PI*2);ctx.stroke();
      // Second tighter ring
      ctx.strokeStyle=`rgba(255,160,255,${0.15+gp*0.35})`;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(ox,oy,o.r+9+gp*6,0,Math.PI*2);ctx.stroke();
      ctx.restore();

      // Body
      const bg=ctx.createRadialGradient(ox,oy,0,ox,oy,o.r);
      bg.addColorStop(0,`rgba(220,80,255,${0.6+gp*0.4})`);
      bg.addColorStop(1,o.col);
      ctx.fillStyle=bg;
      ctx.beginPath();ctx.arc(ox,oy,o.r,0,Math.PI*2);ctx.fill();

      // Spinning asterisk inside — 4 arms, slow rotation, each bumper spins opposite
      ctx.save();
      ctx.translate(ox,oy);
      const spinAngle=frameN*0.018*(oi%2===0?1:-1);
      ctx.rotate(spinAngle);
      ctx.strokeStyle=`rgba(255,220,255,${0.55+gp*0.45})`;ctx.lineWidth=2;
      ctx.save();ctx.shadowColor='rgba(255,100,255,0.9)';ctx.shadowBlur=10;
      for(let arm=0;arm<4;arm++){
        const a=arm/4*Math.PI*2;
        ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*o.r*.72,Math.sin(a)*o.r*.72);ctx.stroke();
      }
      ctx.restore();
      // Spinning arc segments between arms
      ctx.strokeStyle=`rgba(200,100,255,${0.3+gp*0.3})`;ctx.lineWidth=1.5;
      for(let seg=0;seg<4;seg++){
        const a=seg/4*Math.PI*2+Math.PI/4;
        ctx.beginPath();ctx.arc(0,0,o.r*.5,a,a+Math.PI*.38);ctx.stroke();
      }
      ctx.restore();

      // Rim
      ctx.strokeStyle=`rgba(255,200,255,${0.35+gp*0.35})`;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(ox,oy,o.r,0,Math.PI*2);ctx.stroke();

    }else{
      // Standard obstacle drawing for all other stages
      ctx.save();
      ctx.shadowColor=o.glowCol;ctx.shadowBlur=18+pulse*12;
      ctx.strokeStyle=o.glowCol;ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(ox,oy,o.r+3,0,Math.PI*2);ctx.stroke();
      ctx.restore();
      const bg=ctx.createRadialGradient(ox-o.r*.3,oy-o.r*.3,o.r*.1,ox,oy,o.r);
      bg.addColorStop(0,o.ltCol);bg.addColorStop(1,o.col);
      ctx.fillStyle=bg;
      ctx.beginPath();ctx.arc(ox,oy,o.r,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.28)';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(ox,oy,o.r,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.45)';
      ctx.beginPath();ctx.arc(ox-o.r*.28,oy-o.r*.28,o.r*.25,0,Math.PI*2);ctx.fill();
    }
  }
}

// ── Physics: pyramid (rotating AABB) collision ───────────────────────
function hitPyramidObstacle(o,p){
  const cx=BW+o.rx*(W-BW*2), cy=BW+o.ry*(H-BW*2);
  const angle=arcticAngle*(o.rotSpeed||0.65);
  const s=o.size;
  // Transform puck into pyramid local space
  const dx=p.x-cx, dy=p.y-cy;
  const cosA=Math.cos(-angle), sinA=Math.sin(-angle);
  const lx=dx*cosA-dy*sinA, ly=dx*sinA+dy*cosA;
  // Nearest point on AABB [-s,s]²
  const clampX=Math.max(-s,Math.min(s,lx));
  const clampY=Math.max(-s,Math.min(s,ly));
  const edx=lx-clampX, edy=ly-clampY;
  const dist=Math.hypot(edx,edy);
  if(dist>=PUCK_R)return;
  let nnx,nny;
  if(dist<0.01){
    // Puck centre inside square — push through nearest face
    const gX=s-Math.abs(lx), gY=s-Math.abs(ly);
    if(gX<gY){nnx=lx>=0?1:-1;nny=0;}else{nnx=0;nny=ly>=0?1:-1;}
  }else{nnx=edx/dist;nny=edy/dist;}
  // World-space normal
  const cosB=Math.cos(angle), sinB=Math.sin(angle);
  const wnx=nnx*cosB-nny*sinB, wny=nnx*sinB+nny*cosB;
  // Only resolve if puck is moving into the surface
  const dot=p.vx*wnx+p.vy*wny;
  if(dot>0)return;
  // Push puck to surface
  const nLx=clampX+nnx*(PUCK_R+1), nLy=clampY+nny*(PUCK_R+1);
  p.x=cx+nLx*cosB-nLy*sinB; p.y=cy+nLx*sinB+nLy*cosB;
  // Reflect velocity
  p.vx-=2*dot*wnx; p.vy-=2*dot*wny;
  const spd=Math.hypot(p.vx,p.vy);
  if(spd>0.1){const ang=Math.atan2(p.vy,p.vx)+(Math.random()*2-1)*.10;p.vx=Math.cos(ang)*spd;p.vy=Math.sin(ang)*spd;}
  p.spinV=(Math.random()*2-1)*.4;
  burst(p.x,p.y,'#d4a840',9);addShake(1.4);playWall();
}

// ── Physics: turntable (pass-through spin deflection) ─────────────────
function hitTurntable(o,p){
  const cx=BW+o.rx*(W-BW*2), cy=BW+o.ry*(H-BW*2);
  if(Math.hypot(p.x-cx,p.y-cy)>=o.r)return;
  // Rotate velocity vector by omega each frame while puck is inside
  const omega=(o.omega||0.038)*(o.spinDir||1);
  const ca=Math.cos(omega),sa=Math.sin(omega);
  const vx2=p.vx*ca-p.vy*sa;
  const vy2=p.vx*sa+p.vy*ca;
  p.vx=vx2;p.vy=vy2;
}

// ── Physics: triangle (rotating equilateral) collision ───────────────
function hitTriangleObstacle(o,p){
  const cx=BW+o.rx*(W-BW*2), cy=BW+o.ry*(H-BW*2);
  const angle=arcticAngle*(o.rotSpeed||0.3);
  const R=triRadius(o);
  // Transform puck into triangle local space
  const dx=p.x-cx, dy=p.y-cy;
  const cosA=Math.cos(-angle), sinA=Math.sin(-angle);
  const lx=dx*cosA-dy*sinA, ly=dx*sinA+dy*cosA;
  // Equilateral triangle vertices: tip up, CW winding in screen space
  const V=[];
  for(let i=0;i<3;i++){const a=-Math.PI/2+i*Math.PI*2/3;V.push([R*Math.cos(a),R*Math.sin(a)]);}
  // Quick bounding circle cull
  if(Math.hypot(lx,ly)>R+PUCK_R)return;
  let inside=true;
  let minDepth=Infinity,bestNx=1,bestNy=0;
  let closestDist=Infinity,closestPx=0,closestPy=0;
  for(let i=0;i<3;i++){
    const[ax,ay]=V[i],[bx,by]=V[(i+1)%3];
    // Inside test (CW winding in screen coords → inside when cross >= 0)
    const c=(bx-ax)*(ly-ay)-(by-ay)*(lx-ax);
    if(c<0)inside=false;
    // Outward normal for CW winding
    const elen=Math.hypot(bx-ax,by-ay);
    const enx=(by-ay)/elen,eny=-(bx-ax)/elen;
    // Signed depth (positive = puck is inside of this edge)
    const depth=enx*ax+eny*ay-(enx*lx+eny*ly);
    if(depth<minDepth){minDepth=depth;bestNx=enx;bestNy=eny;}
    // Closest point on segment for outside case
    const t2=Math.max(0,Math.min(1,((lx-ax)*(bx-ax)+(ly-ay)*(by-ay))/(elen*elen)));
    const cpx=ax+t2*(bx-ax),cpy=ay+t2*(by-ay);
    const d=Math.hypot(lx-cpx,ly-cpy);
    if(d<closestDist){closestDist=d;closestPx=cpx;closestPy=cpy;}
  }
  let nnx,nny,pushLx,pushLy;
  if(inside){
    // Push out through minimum-depth (nearest) edge
    nnx=bestNx;nny=bestNy;
    const pd=minDepth+PUCK_R+1;
    pushLx=lx+nnx*pd;pushLy=ly+nny*pd;
  }else{
    if(closestDist>=PUCK_R)return;
    if(closestDist<0.01){nnx=1;nny=0;}else{nnx=(lx-closestPx)/closestDist;nny=(ly-closestPy)/closestDist;}
    const pd=PUCK_R-closestDist+1;
    pushLx=lx+nnx*pd;pushLy=ly+nny*pd;
  }
  // World-space normal
  const cosB=Math.cos(angle),sinB=Math.sin(angle);
  const wnx=nnx*cosB-nny*sinB,wny=nnx*sinB+nny*cosB;
  const dot=p.vx*wnx+p.vy*wny;
  if(dot>0)return;
  // Update position
  p.x=cx+pushLx*cosB-pushLy*sinB;p.y=cy+pushLx*sinB+pushLy*cosB;
  // Reflect velocity
  p.vx-=2*dot*wnx;p.vy-=2*dot*wny;
  const spd=Math.hypot(p.vx,p.vy);
  if(spd>0.1){const ang=Math.atan2(p.vy,p.vx)+(Math.random()*2-1)*.10;p.vx=Math.cos(ang)*spd;p.vy=Math.sin(ang)*spd;}
  p.spinV=(Math.random()*2-1)*.4;
  burst(p.x,p.y,'#cc88ff',9);addShake(1.4);playWall();
}

// ── Physics: hexagon obstacle collision ──────────────────────────────
function hitHexObstacle(o,oi,p){
  const{x:cx,y:cy}=obsPos(o,oi);
  const angle=arcticAngle*(o.rotSpeed||0.2);
  const R=o.r;
  const dx=p.x-cx,dy=p.y-cy;
  const cosA=Math.cos(-angle),sinA=Math.sin(-angle);
  const lx=dx*cosA-dy*sinA,ly=dx*sinA+dy*cosA;
  if(Math.hypot(lx,ly)>R+PUCK_R)return;
  const N=6;
  const V=[];
  for(let i=0;i<N;i++){const a=i*Math.PI/3;V.push([R*Math.cos(a),R*Math.sin(a)]);}
  let inside=true;
  let minDepth=Infinity,bestNx=1,bestNy=0;
  let closestDist=Infinity,closestPx=0,closestPy=0;
  for(let i=0;i<N;i++){
    const[ax,ay]=V[i],[bx,by]=V[(i+1)%N];
    const c=(bx-ax)*(ly-ay)-(by-ay)*(lx-ax);
    if(c<0)inside=false;
    const elen=Math.hypot(bx-ax,by-ay);
    const enx=(by-ay)/elen,eny=-(bx-ax)/elen;
    const depth=enx*ax+eny*ay-(enx*lx+eny*ly);
    if(depth<minDepth){minDepth=depth;bestNx=enx;bestNy=eny;}
    const t2=Math.max(0,Math.min(1,((lx-ax)*(bx-ax)+(ly-ay)*(by-ay))/(elen*elen)));
    const cpx=ax+t2*(bx-ax),cpy=ay+t2*(by-ay);
    const d=Math.hypot(lx-cpx,ly-cpy);
    if(d<closestDist){closestDist=d;closestPx=cpx;closestPy=cpy;}
  }
  let nnx,nny,pushLx,pushLy;
  if(inside){
    nnx=bestNx;nny=bestNy;
    const pd=minDepth+PUCK_R+1;
    pushLx=lx+nnx*pd;pushLy=ly+nny*pd;
  }else{
    if(closestDist>=PUCK_R)return;
    if(closestDist<0.01){nnx=1;nny=0;}else{nnx=(lx-closestPx)/closestDist;nny=(ly-closestPy)/closestDist;}
    const pd=PUCK_R-closestDist+1;
    pushLx=lx+nnx*pd;pushLy=ly+nny*pd;
  }
  const cosB=Math.cos(angle),sinB=Math.sin(angle);
  const wnx=nnx*cosB-nny*sinB,wny=nnx*sinB+nny*cosB;
  const dot=p.vx*wnx+p.vy*wny;
  if(dot>0)return;
  p.x=cx+pushLx*cosB-pushLy*sinB;p.y=cy+pushLx*sinB+pushLy*cosB;
  p.vx-=2*dot*wnx;p.vy-=2*dot*wny;
  const spd=Math.hypot(p.vx,p.vy);
  if(spd>0.1){const ang=Math.atan2(p.vy,p.vx)+(Math.random()*2-1)*.09;p.vx=Math.cos(ang)*spd;p.vy=Math.sin(ang)*spd;}
  p.spinV=(Math.random()*2-1)*.4;
  burst(p.x,p.y,o.glowCol||'rgba(255,180,40,0.9)',9);addShake(1.4);playWall();
}

// ── Physics: portal triangle collision ───────────────────────────────
function hitPortalTriangle(o,p){
  const cx=BW+o.rx*(W-BW*2), cy=BW+o.ry*(H-BW*2);
  const angle=arcticAngle*(o.rotSpeed||0.22);
  const R=o.size;
  // Transform puck to local space
  const dx=p.x-cx, dy=p.y-cy;
  const cosA=Math.cos(-angle), sinA=Math.sin(-angle);
  const lx=dx*cosA-dy*sinA, ly=dx*sinA+dy*cosA;
  // Quick bounding circle cull
  if(Math.hypot(lx,ly)>R+PUCK_R)return;
  // Vertices (CW in screen space)
  const V=[];
  for(let i=0;i<3;i++){const a=-Math.PI/2+i*Math.PI*2/3;V.push([R*Math.cos(a),R*Math.sin(a)]);}
  // Find inside/outside and closest edge
  let inside=true;
  let minDepth=Infinity, hitEdge=0;
  let closestDist=Infinity, closestEdge=0, closestPx=0, closestPy=0;
  const EN=[];
  for(let i=0;i<3;i++){
    const[ax,ay]=V[i],[bx,by]=V[(i+1)%3];
    const c=(bx-ax)*(ly-ay)-(by-ay)*(lx-ax);
    if(c<0)inside=false;
    const elen=Math.hypot(bx-ax,by-ay);
    const enx=(by-ay)/elen, eny=-(bx-ax)/elen;
    EN.push([enx,eny]);
    // Depth from this edge (positive = inside)
    const depth=enx*ax+eny*ay-(enx*lx+eny*ly);
    if(depth<minDepth){minDepth=depth;hitEdge=i;}
    // Closest point on segment
    const t2=Math.max(0,Math.min(1,((lx-ax)*(bx-ax)+(ly-ay)*(by-ay))/(elen*elen)));
    const cpx=ax+t2*(bx-ax), cpy=ay+t2*(by-ay);
    const d=Math.hypot(lx-cpx,ly-cpy);
    if(d<closestDist){closestDist=d;closestEdge=i;closestPx=cpx;closestPy=cpy;}
  }
  const cosB=Math.cos(angle), sinB=Math.sin(angle);
  let entryEdge;
  if(inside){
    // Puck center is inside — find which edge it's moving toward
    entryEdge=hitEdge;
    const[enx,eny]=EN[entryEdge];
    const wnx=enx*cosB-eny*sinB, wny=enx*sinB+eny*cosB;
    if(p.vx*wnx+p.vy*wny<=0)return; // not moving outward through this face
  }else{
    if(closestDist>=PUCK_R)return;
    entryEdge=closestEdge;
    // Check puck is approaching (moving toward triangle)
    const nnx=(lx-closestPx)/Math.max(closestDist,0.01);
    const nny=(ly-closestPy)/Math.max(closestDist,0.01);
    const wnx=nnx*cosB-nny*sinB, wny=nnx*sinB+nny*cosB;
    if(p.vx*wnx+p.vy*wny>0)return; // moving away
  }
  // Pick a random exit edge ≠ entry
  const exits=[0,1,2].filter(e=>e!==entryEdge);
  const exitEdge=exits[Math.floor(Math.random()*2)];
  // Exit position: midpoint of exit edge, pushed out by PUCK_R+8
  const[dax,day]=V[exitEdge],[dbx,dby]=V[(exitEdge+1)%3];
  const dMx=(dax+dbx)*0.5, dMy=(day+dby)*0.5;
  const[dnx,dny]=EN[exitEdge];
  const eLx=dMx+dnx*(PUCK_R+8), eLy=dMy+dny*(PUCK_R+8);
  p.x=cx+eLx*cosB-eLy*sinB;
  p.y=cy+eLx*sinB+eLy*cosB;
  // Velocity: outward from exit edge, preserve speed, add slight spread
  const spd=Math.max(Math.hypot(p.vx,p.vy), SPEED_MAX*0.45);
  const worldDnx=dnx*cosB-dny*sinB, worldDny=dnx*sinB+dny*cosB;
  const spread=(Math.random()*2-1)*0.28;
  const exitAng=Math.atan2(worldDny,worldDnx)+spread;
  p.vx=Math.cos(exitAng)*spd; p.vy=Math.sin(exitAng)*spd;
  p.spinV=(Math.random()*2-1)*1.4;
  // Trigger flash on entry and exit edges
  o.portalFlash[entryEdge]=20;
  o.portalFlash[exitEdge]=20;
  burst(p.x,p.y,PORTAL_COLS[exitEdge],14);
  addShake(2.5); playWall();
}

// ── Physics: obstacle (bumper) collision ─────────────────────────────
function hitObstacle(o,oi,p){
  if(o.type==='chicken'&&chickenPhase!=='running')return; // no collision until landed
  if(o.type==='turntable'){hitTurntable(o,p);return;}
  if(o.type==='hex'){hitHexObstacle(o,oi,p);return;}
  if(o.type==='portal_tri'){hitPortalTriangle(o,p);return;}
  if(o.type==='triangle'){hitTriangleObstacle(o,p);return;}
  if(o.type==='pyramid'){hitPyramidObstacle(o,p);return;}
  const{x:ox,y:oy}=obsPos(o,oi);
  const dx=p.x-ox,dy=p.y-oy,dist=Math.hypot(dx,dy),minD=PUCK_R+o.r;
  if(dist>=minD||dist<.1)return;
  const nx=dx/dist,ny=dy/dist;
  p.x=ox+nx*(minD+2);p.y=oy+ny*(minD+2);

  if(o.type==='pinball'){
    // Pop bumper: always blast the puck away at high speed in the outward direction
    const inSpd=Math.hypot(p.vx,p.vy);
    const launchSpd=Math.max(inSpd*1.6, SPEED_MAX*0.82);
    const spread=(Math.random()*2-1)*0.18;
    const ang=Math.atan2(ny,nx)+spread;
    p.vx=Math.cos(ang)*launchSpd; p.vy=Math.sin(ang)*launchSpd;
    p.spinV=(Math.random()*2-1)*1.8;
    o.hitTimer=18;
    burst(ox,oy,'#ff8833',22);burst(ox,oy,'#ffcc44',10);
    addShake(5); playWall(); playWall();
    return;
  }
  if(o.type==='shark'){
    // Shark chomp: blast puck away hard + trigger bite animation

function octCornerBounce(p){
  const C=STAGES[currentStage].octCut??80;
  if(C<2)return false; // no corners cut yet (rectangle phase)
  const K=2*BW+C, pr2=PUCK_R*Math.SQRT2;
  let bounced=false;
  // For each 45° corner: s = the sum-coordinate; nx,ny = ±1 inward normal direction
  const b45=(s,nx,ny,nearX,nearY)=>{
    if(!nearX||!nearY)return;
    const target=K+pr2;if(s>=target)return;
    p.x+=nx*(target-s)/2; p.y+=ny*(target-s)/2;
    const dot=(p.vx*nx+p.vy*ny)*Math.SQRT2*.5;
    if(dot<0){const ovx=p.vx;p.vx=-p.vy*nx*ny;p.vy=-ovx*nx*ny;bounced=true;}
  };
  const near=PUCK_R+C;
  b45(p.x+p.y,           1, 1, p.x<BW+near,   p.y<BW+near);
  b45((W-p.x)+p.y,      -1, 1, p.x>W-BW-near, p.y<BW+near);
  b45(p.x+(H-p.y),       1,-1, p.x<BW+near,   p.y>H-BW-near);
  b45((W-p.x)+(H-p.y), -1,-1, p.x>W-BW-near, p.y>H-BW-near);
  if(bounced){
    const spd=Math.hypot(p.vx,p.vy);
    if(spd>0.1){const ang=Math.atan2(p.vy,p.vx)+(Math.random()*2-1)*WRAND;p.vx=Math.cos(ang)*spd;p.vy=Math.sin(ang)*spd;}
    p.spinV=(Math.random()*2-1)*.35;
    p.wallHits++;playWall();addShake(1.2);
    if(p.wallHits>=SPLIT_THRESHOLD){addShake(5);return true;}
  }
  return false;
}

// ── Draw: puck ───────────────────────────────────────────────────────
function drawPuck(p){
  // Tapered ribbon trail
  if(p.trail.length>=2){
    for(let i=1;i<p.trail.length;i++){
      const t0=p.trail[i-1],t1=p.trail[i],f=i/p.trail.length;
      const w=PUCK_R*f*.55;
      const dx=t1.x-t0.x,dy=t1.y-t0.y,len=Math.hypot(dx,dy)||1;
      const nx=-dy/len,ny=dx/len;
      ctx.beginPath();
      ctx.moveTo(t0.x+nx*w*.6,t0.y+ny*w*.6);ctx.lineTo(t1.x+nx*w,t1.y+ny*w);
      ctx.lineTo(t1.x-nx*w,t1.y-ny*w);ctx.lineTo(t0.x-nx*w*.6,t0.y-ny*w*.6);
      ctx.closePath();ctx.fillStyle=`rgba(210,190,255,${f*.18})`;ctx.fill();
    }
  }
  // Velocity-direction shadow
  const spd=Math.hypot(p.vx,p.vy),sang=Math.atan2(p.vy,p.vx),slen=Math.min(spd*1.8,18);
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath();ctx.ellipse(p.x+Math.cos(sang)*slen*.4,p.y+Math.sin(sang)*slen*.4+5,PUCK_R+slen*.25,PUCK_R*.38,sang,0,Math.PI*2);ctx.fill();
  // Puck sprite (clipped)
  ctx.save();
  ctx.beginPath();ctx.arc(p.x,p.y,PUCK_R,0,Math.PI*2);ctx.clip();
  PT[p.typeIdx].d(ctx,p.x,p.y,PUCK_R);
  ctx.restore();
  // Rim highlight
  ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(p.x-PUCK_R*.15,p.y-PUCK_R*.15,PUCK_R*.7,Math.PI*1.1,Math.PI*1.8);ctx.stroke();
}

function drawScores(){
  const PR=7, GAP=18, Y=20;
  for(let i=0;i<SCORE_TO_WIN;i++){
    // P1 pips — top-left, left to right
    const filled_l=i<scores.l;
    const sl=(i===scores.l-1&&scoreAnim.l>0)?1+0.55*(scoreAnim.l/20):1;
    const pxl=BW+10+i*GAP;

    if(filled_l){ctx.save();ctx.shadowColor=C_CAT;ctx.shadowBlur=10;}

    const sr=(i===scores.r-1&&scoreAnim.r>0)?1+0.55*(scoreAnim.r/20):1;

  }
}

function charSelCard(i){
  const cardW=108,cardH=148,gap=12,rowGap=14;
  const cols=Math.ceil(CHARS.length/2),rows=CHARS.length>cols?2:1;
  const totalW=cols*cardW+(cols-1)*gap;
  const totalH=rows*cardH+(rows-1)*rowGap;
  const sx=(W-totalW)/2,sy=H/2-totalH/2+10;
  const row=Math.floor(i/cols),col=i%cols;

  return{x:rowSx+col*(cardW+gap),y:sy+row*(cardH+rowGap),w:cardW,h:cardH,cols};

    ctx.fillText(b.label,btnX+14,by+22);

// ── Landing page helper: draw a static puck ──────────────────────────
function drawStaticPuck(px,py,typeIdx,scale=1){
  const r=PUCK_R*scale;
  ctx.save();ctx.translate(px,py);ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.clip();
  PT[typeIdx].d(ctx,0,0,r);ctx.restore();
  ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(px,py,r-1,Math.PI*.08,Math.PI*.92);ctx.stroke();
}

    {ci:6,x:878,y:374,r:52,emote:'happy',winkLeft:false},

// ── Perfect Game: per-character victory animations ────────────────────
function drawCatPerfect(x,y,r,t){
  ctx.save();ctx.translate(x,y);
  const spin=t<0.75?t*12:9+Math.sin(t*8)*0.3;
  const wobble=Math.sin(t*28)*0.08*(1-t);
  ctx.rotate(spin+wobble);
  const sc=t<0.15?t/0.15:1+Math.sin(t*14)*0.08;
  ctx.scale(sc,sc);
  // Body
  const g=ctx.createRadialGradient(-r*.2,-r*.2,r*.05,0,0,r);
  g.addColorStop(0,'#ffcc66');g.addColorStop(1,C_CAT);
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=C_OUTLINE;ctx.lineWidth=2.5;ctx.stroke();

// ── Physics ──────────────────────────────────────────────────────────
function clampM(m){
  m.y=Math.max(BW+m.r,Math.min(H-BW-m.r,m.y));
  const halfIn=m.r*0.5; // allow up to 50% of body inside the goal
  if(m.side==='l') m.x=Math.max(BW-halfIn,Math.min(MALLET_XL+MALLET_XRANGE,m.x));
  else             m.x=Math.max(MALLET_XR-MALLET_XRANGE,Math.min(W-BW+halfIn,m.x));
}
function hitMallet(m,p){
  const dx=p.x-m.x,dy=p.y-m.y,dist=Math.hypot(dx,dy),minD=PUCK_R+m.r;
  if(dist>=minD||dist<.1)return;
  const nx=dx/dist,ny=dy/dist;
  p.x=m.x+nx*(minD+1);p.y=m.y+ny*(minD+1);
  const rvx=p.vx-m.vx,rvy=p.vy-m.vy,rd=rvx*nx+rvy*ny;
  p.vx=(rvx-2*rd*nx)+m.vx;p.vy=(rvy-2*rd*ny)+m.vy;
  if(m.x<W/2&&p.vx<0)p.vx=Math.abs(p.vx);
  if(m.x>W/2&&p.vx>0)p.vx=-Math.abs(p.vx);
  const spd=Math.min(SPEED_MAX,Math.hypot(p.vx,p.vy)+SPEED_INC);
  const ang=Math.atan2(p.vy,p.vx)+(Math.random()*2-1)*HRAND;
  p.vx=Math.cos(ang)*spd;p.vy=Math.sin(ang)*spd;p.spinV=(Math.random()*2-1)*.35;
  p.lastHitter=m;
  m.hits++;m.r=Math.max(9,FULL_R*(1-m.hits/MAX_HITS));
  if(m.hits>=MAX_HITS)m.alive=false;
  m.sx=(Math.random()*7-3.5);m.sy=(Math.random()*7-3.5);
  burst(p.x,p.y,CHARS[m.charIdx].col,14);
  addShake(2.5+m.hits*.2);playHit();
  if(Math.random()<0.3&&!m.emote)triggerEmote(m,'surprised',40);
}
function wallBounce(p,axis,flip){
  const spd=Math.hypot(p.vx,p.vy);
  if(axis==='x')p.vx=flip*Math.abs(p.vx); else p.vy=flip*Math.abs(p.vy);
  const ang=Math.atan2(p.vy,p.vx)+(Math.random()*2-1)*WRAND;
  p.vx=Math.cos(ang)*spd;p.vy=Math.sin(ang)*spd;p.spinV=(Math.random()*2-1)*.35;
  p.wallHits++;playWall();addShake(1.2);
  if(p.wallHits>=SPLIT_THRESHOLD){addShake(5);return true;}
  return false;
}

function gpBtn(gp,i){return !!(gp.buttons[i]?.pressed||gp.buttons[i]?.value>0.5);}
function gpConfirmDown(gp){return gpBtn(gp,1)||gpBtn(gp,9);}  // A(1) or Start(9)
function gpBDown(gp){return gpBtn(gp,2);}  // B button — back/cancel
// Debounced stick axis: returns -1, 0, or +1 and fires debounce when threshold crossed
function gpAxisStep(gp,axisIdx,debounceRef,frames=14){
  const v=gp.axes[axisIdx]??0;
  if(debounceRef.v>0){debounceRef.v--;return 0;}
  if(v<-0.5){debounceRef.v=frames;return -1;}
  if(v>0.5){debounceRef.v=frames;return 1;}
  return 0;
}

    if(gpBtn(gp1,15)||(gp1.axes[0]>0.5)){p2CharSel=(p2CharSel+1)%CHARS.length;_charselGpDebounce=14;return;}
    if(gpBtn(gp1,12)||(gp1.axes[1]<-0.5)){const n=p2CharSel-_gcols;if(n>=0)p2CharSel=n;_charselGpDebounce=14;return;}
    if(gpBtn(gp1,13)||(gp1.axes[1]>0.5)){const n=p2CharSel+_gcols;if(n<CHARS.length)p2CharSel=n;_charselGpDebounce=14;return;}
    if(gpConfirmDown(gp1)){confirmP2Char();_charselGpDebounce=30;getAC();}
  }
}

function update(){
  if(state==='landing'){frameN++;updateLandingGamepad();return;}
  if(state==='mainmenu'){frameN++;updateMenuGamepad();return;}
  if(state==='options'){frameN++;updateOptionsGamepad();return;}
  if(state==='modesel'){frameN++;updateModeSelGamepad();return;}
  if(state==='menu'){updateMenuGamepad();return;}
  if(state==='over'){if(perfectT>0&&perfectT<PERFECT_DUR){perfectT++;frameN++;return;}updateOverGamepad();return;}
  if(state==='stagesel'){frameN++;updateStageSelGamepad();return;}
  if(state==='charsel'){
    frameN++;
    updateCharSelGamepad();
    if(charselCountdown>0){charselCountdown--;if(charselCountdown===0){applyOptions();init();}}
    return;
  }
  if(state!=='playing')return;
  // Pause toggle — Start button or Escape
  if(gpPauseDebounce>0)gpPauseDebounce--;
  {const _gp=getP1GP()??getP2GP();
   if(_gp?.buttons[9]?.pressed&&gpPauseDebounce===0){paused=!paused;gpPauseDebounce=22;}}
  if(paused)return;
  frameN++;
  arcticAngle+=0.004;
  // Morph shape: update octCut each tick so walls and collision stay in sync
  const _mst=STAGES[currentStage];
  if(_mst.shape==='morph')_mst.octCut=(_mst.maxOctCut||88)*0.5*(1-Math.cos(arcticAngle*(_mst.morphSpeed||0.32)));
  if(_mst.goalScale){
    // Goal grows and shrinks ±30% at medium rate
    const sc=1+_mst.goalScale*Math.sin(arcticAngle*(_mst.goalScaleSpeed||1.0));
    const gh=GOAL_H*sc,mid=H/2;
    gLT=mid-gh/2;gLB=mid+gh/2;gRT=mid-gh/2;gRB=mid+gh/2;
  }else if(_mst.goalShift){const _off=_mst.goalShift*Math.sin(arcticAngle*(_mst.goalShiftSpeed||1.0));gLT=GOAL_TOP+_off;gLB=GOAL_BOT+_off;gRT=GOAL_TOP-_off;gRB=GOAL_BOT-_off;}else{gLT=GOAL_TOP;gLB=GOAL_BOT;gRT=GOAL_TOP;gRB=GOAL_BOT;}
  tickWanderObs();
  tickChicken();
  tickGrandPrix();
  // Update ink clouds (Deep Blue octopus)
  for(const ic of inkClouds){ic.x+=ic.vx;ic.y+=ic.vy;ic.vx*=0.96;ic.vy*=0.96;ic.r+=0.4;ic.life-=ic.decay;}
  inkClouds=inkClouds.filter(ic=>ic.life>0);
  // Update camera shake
  camShakeX*=0.72;camShakeY*=0.72;
  if(Math.abs(camShakeX)<0.05)camShakeX=0;if(Math.abs(camShakeY)<0.05)camShakeY=0;
  // Update score pip animation
  if(scoreAnim.l>0)scoreAnim.l--;if(scoreAnim.r>0)scoreAnim.r--;
  // Update floating texts
  for(const ft of floatTexts){ft.y+=ft.vy;ft.vy*=0.93;ft.life-=0.013;}
  floatTexts=floatTexts.filter(ft=>ft.life>0);
  // Update puck name timer
  if(puckNameT>0)puckNameT--;
  // Track new puck type for name card
  if(pucks.length&&pucks[0].typeIdx!==lastPuckIdx){lastPuckIdx=pucks[0].typeIdx;puckNameT=90;}

  // slow-mo: only run physics every 5th frame
  if(slowMoTimer>0){
    slowMoTimer--;
    for(const ring of rings){ring.r+=ring.speed*.3;ring.hue+=2;ring.life=Math.max(0,1-ring.r/ring.maxR);}
    rings=rings.filter(r=>r.life>0);
    for(const p of parts){p.x+=p.vx*.2;p.y+=p.vy*.2;p.vy+=.02;p.life-=p.decay*.2;}
    parts=parts.filter(p=>p.life>0);
    if(flashT>0)flashT--;
    if(frameN%5!==0)return;
  }else{
    for(const ring of rings){ring.r+=ring.speed;ring.hue+=3;ring.life=Math.max(0,1-ring.r/ring.maxR);}
    rings=rings.filter(r=>r.life>0);
  }

  const MS=7.2+optMalletSpeed*0.4;
  const gp=getGPInput();
  // Left mallet — WASD or gamepad or touch
  const lky=(keys['w']||keys['W'])?-1:(keys['s']||keys['S'])?1:0;
  const lkx=(keys['a']||keys['A'])?-1:(keys['d']||keys['D'])?1:0;
  if(touchL&&LM.alive){
    // Move toward touch point — speed scales with distance
    const tdx=touchL.x-LM.x, tdy=touchL.y-LM.y, td=Math.hypot(tdx,tdy);
    const ts=Math.min(MS,td*0.2);
    LM.vx=td>2?tdx/td*ts:0; LM.vy=td>2?tdy/td*ts:0;
  }else{
    LM.vy=(lky||gp.ly)*MS; LM.vx=(lkx||gp.lx)*MS;
  }
  // Right mallet — NPC in 1P mode, human input (keys/gamepad/touch) in 2P mode
  if(gameMode==='1p'){
    if(touchR&&RM.alive){
      // In 1P, let the player use right-side touch to override NPC (play both sides)
      const tdx=touchR.x-RM.x, tdy=touchR.y-RM.y, td=Math.hypot(tdx,tdy);
      const ts=Math.min(MS,td*0.2);
      RM.vx=td>2?tdx/td*ts:0; RM.vy=td>2?tdy/td*ts:0;
    }else{
      updateNPC();
    }
  }else{
    if(touchR&&RM.alive){
      const tdx=touchR.x-RM.x, tdy=touchR.y-RM.y, td=Math.hypot(tdx,tdy);
      const ts=Math.min(MS,td*0.2);
      RM.vx=td>2?tdx/td*ts:0; RM.vy=td>2?tdy/td*ts:0;
    }else{
      const rky=(keys['ArrowUp'])?-1:(keys['ArrowDown'])?1:0;
      const rkx=(keys['ArrowLeft'])?-1:(keys['ArrowRight'])?1:0;
      RM.vy=(rky||gp.ry)*MS; RM.vx=(rkx||gp.rx)*MS;
    }
  }
  if(LM.alive){LM.x+=LM.vx;LM.y+=LM.vy;clampM(LM);LM.sx*=.65;LM.sy*=.65;}
  if(RM.alive){RM.x+=RM.vx;RM.y+=RM.vy;clampM(RM);RM.sx*=.65;RM.sy*=.65;}

  // Emote ticks + random triggers
  for(const m of[LM,RM]){
    if(m.emoteTimer>0){m.emoteTimer--;if(m.emoteTimer===0)m.emote=null;}
    if(!m.emote){
      if(m.nextEmote>0)m.nextEmote--;
      else{const ue=CHARS[m.charIdx].uniqueEmote;const opts=ue?['wink','wink','surprised','happy',ue]:['wink','wink','surprised','happy'];m.emote=opts[Math.floor(Math.random()*opts.length)];m.emoteTimer=m.emote==='wink'?50:m.emote==='surprised'?45:65;m.winkLeft=Math.random()<0.5;m.nextEmote=240+Math.floor(Math.random()*240);}
    }
  }

  // Power-up spawn timer — earlier when players are hurting, later at full HP
  if(!powerUp){
    if(powerUpTimer>0){powerUpTimer--;}
    else{
      const px=W/2+(Math.random()*2-1)*W*.14;
      const py=H*.22+Math.random()*H*.56;
      powerUp={x:px,y:py,r:PUCK_R*1.4,glimmerT:0};
    }
  }

  const next=[];let scored=false;
  for(const p of pucks){
    p.trail.push({x:p.x,y:p.y});
    if(p.trail.length>10)p.trail.shift();
    p.vx+=(Math.random()-.5)*.18;p.vy+=(Math.random()-.5)*.18;
    // Lava Lamp terrain: globs act as 3D hills that deflect the puck
    if(STAGES[currentStage].texture==='lavaglob'){
      const globs=_lavaGlobs();
      for(const g of globs){
        const dx=p.x-g.x,dy=p.y-g.y,dist=Math.hypot(dx,dy);
        if(dist<g.r*1.3&&dist>1){
          // Strength peaks at glob edge, falls off outside — like rolling off a dome
          const t=dist/(g.r*1.3);
          const force=0.35*Math.sin(t*Math.PI); // bell curve: 0 at center, peak at ~half, 0 at edge
          p.vx+=dx/dist*force;
          p.vy+=dy/dist*force;
        }
      }
    }
    let spd=Math.hypot(p.vx,p.vy);
    if(spd>SPEED_MAX){p.vx*=SPEED_MAX/spd;p.vy*=SPEED_MAX/spd;}
    if(spd<3.5){p.vx*=3.5/spd;p.vy*=3.5/spd;}
    p.x+=p.vx;p.y+=p.vy;p.spin+=p.spinV;p.spinV*=.97;

    let doSplit=false;
    const stShape=STAGES[currentStage].shape||'rect';
    if(stShape==='oval'){
      // Ellipse boundary — handles all four sides + goal detection
      const a=W/2-BW-PUCK_R, b=H/2-BW-PUCK_R;
      const dx=p.x-W/2, dy=p.y-H/2;
      if((dx/a)*(dx/a)+(dy/b)*(dy/b)>1){
        if(dx<0&&p.y>gLT&&p.y<gLB){
          if(!scored){scores.r++;scoreAnim.r=20;burst(p.x,p.y,'#ff5555',22);resetMallet(RM);resetMallet(LM);rainbowBurst(RM.x,RM.y);flashT=22;scored=true;addShake(8);playGoal();addFloat(W/2,H/2-30,'GOAL!',C_CAPY);puckNameT=90;triggerEmote(RM,'love',120);triggerEmote(LM,'surprised',80);if(scores.r>=SCORE_TO_WIN){state='over';if(scores.l===0)perfectT=1;}}
          continue;
        }
        if(dx>0&&p.y>gRT&&p.y<gRB){
          if(!scored){scores.l++;scoreAnim.l=20;burst(p.x,p.y,'#5588ff',22);resetMallet(LM);resetMallet(RM);rainbowBurst(LM.x,LM.y);flashT=22;scored=true;addShake(8);playGoal();addFloat(W/2,H/2-30,'GOAL!',C_CAT);puckNameT=90;triggerEmote(LM,'love',120);triggerEmote(RM,'surprised',80);if(scores.l>=SCORE_TO_WIN){state='over';if(scores.r===0)perfectT=1;}}
          continue;
        }
        const theta=Math.atan2(dy/b,dx/a);
        p.x=W/2+Math.cos(theta)*a; p.y=H/2+Math.sin(theta)*b;
        const gx=(p.x-W/2)/(a*a),gy=(p.y-H/2)/(b*b),gl=Math.hypot(gx,gy);
        const nx=gx/gl,ny=gy/gl,dot=p.vx*nx+p.vy*ny;
        if(dot>0){p.vx-=2*dot*nx;p.vy-=2*dot*ny;}
        const spd2=Math.hypot(p.vx,p.vy);
        if(spd2>0.1){const ang=Math.atan2(p.vy,p.vx)+(Math.random()*2-1)*WRAND;p.vx=Math.cos(ang)*spd2;p.vy=Math.sin(ang)*spd2;}
        p.spinV=(Math.random()*2-1)*.35;
        p.wallHits++;playWall();addShake(1.2);
        if(p.wallHits>=SPLIT_THRESHOLD){addShake(5);doSplit=true;}
      }
    }else{
      // Rectangular top/bottom walls
      if(p.y-PUCK_R<BW){p.y=BW+PUCK_R;doSplit=wallBounce(p,'y',1)||doSplit;}
      if(p.y+PUCK_R>H-BW){p.y=H-BW-PUCK_R;doSplit=wallBounce(p,'y',-1)||doSplit;}
      // Left wall + goal
      if(p.x-PUCK_R<BW){
        if(p.y>gLT&&p.y<gLB&&!gpShieldBlock(p)){
          if(!scored){scores.r++;scoreAnim.r=20;burst(p.x,p.y,'#ff5555',22);resetMallet(RM);resetMallet(LM);rainbowBurst(RM.x,RM.y);flashT=22;scored=true;addShake(8);playGoal();addFloat(W/2,H/2-30,'GOAL!',C_CAPY);puckNameT=90;triggerEmote(RM,'love',120);triggerEmote(LM,'surprised',80);if(scores.r>=SCORE_TO_WIN){state='over';if(scores.l===0)perfectT=1;}}
          continue;
        }else if(!(p.y>gLT&&p.y<gLB)){p.x=BW+PUCK_R;doSplit=wallBounce(p,'x',1)||doSplit;}
      }
      // Right wall + goal
      if(p.x+PUCK_R>W-BW){
        if(p.y>gRT&&p.y<gRB&&!gpShieldBlock(p)){
          if(!scored){scores.l++;scoreAnim.l=20;burst(p.x,p.y,'#5588ff',22);resetMallet(LM);resetMallet(RM);rainbowBurst(LM.x,LM.y);flashT=22;scored=true;addShake(8);playGoal();addFloat(W/2,H/2-30,'GOAL!',C_CAT);puckNameT=90;triggerEmote(LM,'love',120);triggerEmote(RM,'surprised',80);if(scores.l>=SCORE_TO_WIN){state='over';if(scores.r===0)perfectT=1;}}
          continue;
        }else if(!(p.y>gRT&&p.y<gRB)){p.x=W-BW-PUCK_R;doSplit=wallBounce(p,'x',-1)||doSplit;}
      }
      // Octagon corner diagonal bounces
      if(stShape==='oct'||stShape==='morph')doSplit=octCornerBounce(p)||doSplit;
    }

    if(LM.alive)hitMallet(LM,p);
    if(RM.alive)hitMallet(RM,p);
    STAGES[currentStage].obstacles.forEach((o,oi)=>hitObstacle(o,oi,p));
    gpBoosterHit(p);

    // Power-up collision
    if(powerUp&&Math.hypot(p.x-powerUp.x,p.y-powerUp.y)<PUCK_R+powerUp.r){
      const m=p.lastHitter;
      if(m&&m.alive){
        m.hits=Math.max(0,m.hits-5);
        m.r=Math.max(9,FULL_R*(1-m.hits/MAX_HITS));
        addFloat(powerUp.x,powerUp.y-36,'+5',CHARS[m.charIdx].col);
        triggerEmote(m,'love',90);
        burst(powerUp.x,powerUp.y,CHARS[m.charIdx].col,24);
      }else{burst(powerUp.x,powerUp.y,'#40ffcc',20);}
      addShake(3.5);
      // Next spawn: HP-aware (10–15s): lower HP → sooner
      const avgHp=1-(LM.hits+RM.hits)/(MAX_HITS*2);
      powerUpTimer=Math.round(600+avgHp*300);
      powerUp=null;
    }

    if(doSplit){
      if(isGrandPrix()&&!gpMouth){
        // Wall mouth eats the puck instead of normal split
        const side=p.x<W/2?'l':'r';
        const mx=side==='l'?BW:W-BW;
        gpMouth={x:mx,y:Math.max(BW+50,Math.min(H-BW-50,p.y)),side:side,t:0,lastHitter:p.lastHitter};
        burst(p.x,p.y,'#ff4444',16);addShake(5);addFloat(p.x,p.y-30,'NOM!','#ff4444');
        // Puck is consumed — don't push to next
      }else{burst(p.x,p.y,'#ffffff',18);next.push(...splitPuck(p));}
    }else next.push(p);
  }
  if(STAGES[currentStage].name==='Chicken Coop'&&chickenPhase!=='off'){
    if(scored){chickenEggTimer=Math.min(chickenEggTimer,180);} // quick next egg after goal
    pucks=next.length?next:[];
  }else if(isGrandPrix()&&gpMouth){
    // Wall mouth is chewing — don't auto-spawn, mouth will spit pucks out
    pucks=scored?[makePuck()]:(next.length?next:[]);
  }else{
    pucks=scored?[makePuck()]:(next.length?next:[makePuck()]);
  }

  // Puck-to-puck elastic collisions
  for(let i=0;i<pucks.length;i++){
    for(let j=i+1;j<pucks.length;j++){
      const a=pucks[i],b=pucks[j];
      const dx=b.x-a.x,dy=b.y-a.y,dist=Math.hypot(dx,dy),minD=PUCK_R*2;
      if(dist>=minD||dist<0.01)continue;
      // Separate
      const overlap=(minD-dist)/2,nx=dx/dist,ny=dy/dist;
      a.x-=nx*overlap;a.y-=ny*overlap;
      b.x+=nx*overlap;b.y+=ny*overlap;
      // Exchange velocity along collision normal (equal-mass elastic)
      const dvx=a.vx-b.vx,dvy=a.vy-b.vy;
      const dot=dvx*nx+dvy*ny;
      if(dot<=0)continue; // already separating
      a.vx-=dot*nx;a.vy-=dot*ny;
      b.vx+=dot*nx;b.vy+=dot*ny;
      playWall();addShake(1.0);
    }
  }

  for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.life-=p.decay;}
  parts=parts.filter(p=>p.life>0);
  if(flashT>0)flashT--;
}

// ── Render ───────────────────────────────────────────────────────────
function draw(){
  if(state==='landing'){drawLanding();return;}
  if(state==='mainmenu'){drawMainMenu();return;}
  if(state==='options'){drawOptions();return;}
  if(state==='modesel'){drawModeSelect();return;}
  if(state==='menu'){drawMenu();return;}
  if(state==='charsel'){drawCharSel();return;}
  if(state==='stagesel'){drawStageSelect();return;}
  ctx.clearRect(0,0,W,H);
  if(flashT>0){ctx.fillStyle=`rgba(255,240,180,${flashT/22*.25})`;ctx.fillRect(0,0,W,H);}
  // Camera shake wrapper
  ctx.save();
  ctx.translate(camShakeX,camShakeY);
  drawTable();
  drawObstacles();
  // Octopus ink clouds (purely visual)
  for(const ic of inkClouds){
    const ig=ctx.createRadialGradient(ic.x,ic.y,0,ic.x,ic.y,ic.r);
    ig.addColorStop(0,`hsla(${ic.hue},70%,15%,${ic.life*0.45})`);
    ig.addColorStop(0.4,`hsla(${ic.hue},60%,20%,${ic.life*0.3})`);
    ig.addColorStop(1,`hsla(${ic.hue},50%,25%,0)`);
    ctx.fillStyle=ig;ctx.beginPath();ctx.arc(ic.x,ic.y,ic.r,0,Math.PI*2);ctx.fill();
  }
  drawGrandPrix();
  drawPowerUp();
  drawScores();
  drawRings();
  drawParts();
  // Mallet shadows behind everything
  drawMalletShadow(LM);drawMalletShadow(RM);
  ctx.save();ctx.translate(LM.sx,LM.sy);CHARS[LM.charIdx].draw(LM);ctx.restore();
  ctx.save();ctx.translate(RM.sx,RM.sy);CHARS[RM.charIdx].draw(RM);ctx.restore();
  for(const p of pucks)drawPuck(p);
  drawHitLabels();
  drawPuckName();
  drawFloatTexts();
  ctx.restore(); // end camera shake
  if(state==='over')drawOver();
  if(paused){
    ctx.fillStyle='rgba(0,0,0,0.52)';ctx.fillRect(0,0,W,H);
    ctx.save();
    ctx.shadowColor='rgba(255,220,80,0.8)';ctx.shadowBlur=28;
    ctx.font='bold 54px Nunito,monospace';ctx.textAlign='center';ctx.fillStyle='#ffe566';
    ctx.fillText('PAUSED',W/2,H/2-14);
    ctx.restore();
    ctx.font='18px Nunito,monospace';ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.fillText('Start / Esc to resume',W/2,H/2+26);
  }
}

// ── Gamepad debug overlay ─────────────────────────────────────────────
const _gpDbgEl=document.createElement('div');
Object.assign(_gpDbgEl.style,{position:'fixed',top:'8px',left:'8px',background:'rgba(0,0,0,0.85)',
  color:'#0f0',fontFamily:'monospace',fontSize:'11px',padding:'6px 10px',borderRadius:'6px',
  zIndex:'9999',pointerEvents:'none',whiteSpace:'pre',lineHeight:'1.5'});
document.body.appendChild(_gpDbgEl);
function updateGPDebug(){
  const gps=navigator.getGamepads?[...navigator.getGamepads()]:[];
  const active=gps.filter(g=>g);
  if(!active.length){_gpDbgEl.textContent='No gamepads detected\n(press a button on a controller)';return;}
  const [p1,p2]=getPlayerGPs();
  const p1idx=p1?p1.index:-1, p2idx=p2?p2.index:-1;
  _gpDbgEl.textContent=active.map(g=>{
    const axes=Array.from(g.axes).map(v=>v.toFixed(2)).join(' ');
    const btns=Array.from(g.buttons).map((b,i)=>b.pressed?i:null).filter(i=>i!==null).join(',');
    const who=g.index===p1idx?'P1':g.index===p2idx?'P2':'??';
    return `[${g.index}→${who}] ${g.id}\n  axes: ${axes}  btns: ${btns||'-'}`;
  }).join('\n');
}

function loop(){update();draw();updateGPDebug();requestAnimationFrame(loop);}
loop();
</script>
